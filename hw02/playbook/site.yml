# =============================================================================
# site.yml – Production-ready Ansible Playbook (FINAL VERSION)
#
# Стек:
#   - ClickHouse (CentOS 7)
#   - Vector (Ubuntu 22/24)
#
# Архитектура:
#   1. Bootstrap Python (RAW, без Ansible modules)
#   2. ClickHouse install + firewall + healthcheck
#   3. Vector install + systemd
#
# Особенности:
#   ✔ Работает в --check mode
#   ✔ Fail-fast логика
#   ✔ Без regex (устойчивость)
#   ✔ idempotent install
#   ✔ healthchecks
#   ✔ safe Python bootstrap (PEP668 fix)
# =============================================================================

---

# =============================================================================
# BOOTSTRAP (обязательный этап для Ansible)
# =============================================================================
- name: Bootstrap hosts (install Python runtime)
  hosts: all
  become: true
  gather_facts: false   # важно: иначе падает setup модуль

  tasks:

    # -------------------------------------------------------------------------
    # Определяем ОС без Python (через shell)
    # -------------------------------------------------------------------------
    - name: Detect OS type
      raw: |
        if [ -f /etc/debian_version ]; then echo "debian";
        elif [ -f /etc/redhat-release ]; then echo "redhat";
        else echo "unknown"; fi
      register: os_type
      changed_when: false
      check_mode: false

    # -------------------------------------------------------------------------
    # Ubuntu / Debian
    # -------------------------------------------------------------------------
    - name: Install Python (Debian/Ubuntu)
      raw: |
        apt-get update -y && \
        apt-get install -y python3 python3-apt python3-venv python3-full
      when: "'debian' in (os_type.stdout | default(''))"
      check_mode: false

    # -------------------------------------------------------------------------
    # CentOS 7 / RHEL
    # -------------------------------------------------------------------------
    - name: Install Python (CentOS/RHEL)
      raw: |
        yum install -y python3 python3-libs
      when: "'redhat' in (os_type.stdout | default(''))"
      check_mode: false


# =============================================================================
# STAGE 1 — CLICKHOUSE
# =============================================================================
- name: Install ClickHouse
  hosts: clickhouse
  become: true
  vars_files:
    - group_vars/clickhouse/vars.yml

  tasks:

    # -------------------------------------------------------------------------
    # Установка зависимостей
    # -------------------------------------------------------------------------
    - name: Install dependencies
      ansible.builtin.yum:
        name:
          - glibc
          - libstdc++
        state: present

    # -------------------------------------------------------------------------
    # Директория под RPM
    # -------------------------------------------------------------------------
    - name: Create RPM directory
      ansible.builtin.file:
        path: "{{ clickhouse_rpm_dir }}"
        state: directory
        mode: "0755"

    # -------------------------------------------------------------------------
    # Скачивание пакетов (устойчиво к зеркалам)
    # -------------------------------------------------------------------------
    - name: Download ClickHouse packages (try all mirrors)
      ansible.builtin.get_url:
        url: "{{ item.0 }}/{{ item.1.name }}-{{ clickhouse_version }}.{{ item.2 }}.rpm"
        dest: "{{ clickhouse_rpm_dir }}/{{ item.1.name }}-{{ clickhouse_version }}.rpm"
        mode: "0644"
      loop: "{{ clickhouse_mirrors | product(clickhouse_packages, ['noarch','x86_64']) | list }}"
      register: download_results
      ignore_errors: true
      changed_when: false

    # -------------------------------------------------------------------------
    # Проверка файлов
    # -------------------------------------------------------------------------
    - name: Check RPM files exist
      ansible.builtin.stat:
        path: "{{ clickhouse_rpm_dir }}/{{ item.name }}-{{ clickhouse_version }}.rpm"
      loop: "{{ clickhouse_packages }}"
      register: rpm_files

    - name: Fail if RPM missing
      ansible.builtin.fail:
        msg: "RPM пакет не найден: {{ item.item.name }} (all mirrors failed)"
      when: not item.stat.exists
      loop: "{{ rpm_files.results }}"

    # -------------------------------------------------------------------------
    # Формируем список файлов
    # -------------------------------------------------------------------------
    - name: Build RPM list
      ansible.builtin.set_fact:
        clickhouse_rpm_files: >-
          {{
            clickhouse_rpm_files | default([]) +
            [ clickhouse_rpm_dir ~ '/' ~ item.name ~ '-' ~ clickhouse_version ~ '.rpm' ]
          }}
      loop: "{{ clickhouse_packages }}"

    # -------------------------------------------------------------------------
    # Установка
    # -------------------------------------------------------------------------
    - name: Install ClickHouse
      ansible.builtin.yum:
        name: "{{ clickhouse_rpm_files }}"
        state: present

    # -------------------------------------------------------------------------
    # Запуск сервиса
    # -------------------------------------------------------------------------
    - name: Start ClickHouse
      ansible.builtin.systemd:
        name: clickhouse-server
        state: started
        enabled: true

    # -------------------------------------------------------------------------
    # Ожидание TCP
    # -------------------------------------------------------------------------
    - name: Wait ClickHouse TCP
      ansible.builtin.wait_for:
        port: 9000
        timeout: 60

    # -------------------------------------------------------------------------
    # Healthcheck HTTP 
    # -------------------------------------------------------------------------
    - name: Wait ClickHouse HTTP (skip in check mode)
      ansible.builtin.uri:
        url: "http://127.0.0.1:8123/ping"
        return_content: true
      register: ch_health
      retries: 10
      delay: 3
      until: "'Ok.' in (ch_health.content | default(''))"
      when: not ansible_check_mode
      changed_when: false

    # -------------------------------------------------------------------------
    # Firewall
    # -------------------------------------------------------------------------
    - name: Check ClickHouse TCP port 9000
      ansible.builtin.shell: iptables -C INPUT -p tcp --dport 9000 -j ACCEPT
      register: ipt_9000
      failed_when: false
      changed_when: false

    - name: Open ClickHouse TCP 9000
      ansible.builtin.shell: iptables -A INPUT -p tcp --dport 9000 -j ACCEPT
      when: ipt_9000.rc != 0

    - name: Check ClickHouse HTTP port 8123
      ansible.builtin.shell: iptables -C INPUT -p tcp --dport 8123 -j ACCEPT
      register: ipt_8123
      failed_when: false
      changed_when: false

    - name: Open ClickHouse HTTP 8123
      ansible.builtin.shell: iptables -A INPUT -p tcp --dport 8123 -j ACCEPT
      when: ipt_8123.rc != 0

# =============================================================================
# STAGE 2 — VECTOR
# =============================================================================
- name: Install Vector
  hosts: vector
  become: true
  vars_files:
    - group_vars/vector/vars.yml

  handlers:
    - name: restart vector
      ansible.builtin.systemd:
        name: vector
        state: restarted
        daemon_reload: true

  tasks:

    # -------------------------------------------------------------------------
    # Установка tar curl
    # -------------------------------------------------------------------------
    - name: Install dependencies
      ansible.builtin.apt:
        name:
          - tar
          - curl
        state: present
        update_cache: true

    # -------------------------------------------------------------------------
    # Директории
    # -------------------------------------------------------------------------
    - name: Create Vector directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      loop:
        - "{{ vector_install_dir }}"
        - "{{ vector_config_dir }}"
        - "{{ vector_data_dir }}"

    # -------------------------------------------------------------------------
    # Скачать архив
    # -------------------------------------------------------------------------
    - name: Download Vector
      ansible.builtin.get_url:
        url: "{{ vector_url }}"
        dest: "/tmp/vector.tar.gz"
        mode: "0644"

    # -------------------------------------------------------------------------
    # Распаковка
    # -------------------------------------------------------------------------
    - name: Extract Vector
      ansible.builtin.unarchive:
        src: "/tmp/vector.tar.gz"
        dest: "{{ vector_install_dir }}"
        remote_src: true
        extra_opts:
          - --strip-components=1

    # -------------------------------------------------------------------------
    # Поиск бинарника
    # -------------------------------------------------------------------------
    - name: Find vector binary
      ansible.builtin.find:
        paths: "{{ vector_install_dir }}"
        patterns: "vector"
        recurse: true
        file_type: file
      register: vector_binary

    - name: Fail if vector not found
      ansible.builtin.fail:
        msg: "Vector binary not found"
      when: vector_binary.matched == 0

    # -------------------------------------------------------------------------
    # Симлинк
    # -------------------------------------------------------------------------
    - name: Create symlink
      ansible.builtin.file:
        src: "{{ vector_binary.files | map(attribute='path') | list | first }}"
        dest: "/usr/local/bin/vector"
        state: link
        force: true

    # -------------------------------------------------------------------------
    # Конфиг
    # -------------------------------------------------------------------------
    - name: Configure Vector
      ansible.builtin.template:
        src: vector.toml.j2
        dest: "{{ vector_config_file }}"
      notify: restart vector

    # -------------------------------------------------------------------------
    # systemd
    # -------------------------------------------------------------------------
    - name: Create systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/vector.service
        content: |
          [Unit]
          Description=Vector
          After=network.target

          [Service]
          ExecStart=/usr/local/bin/vector --config {{ vector_config_file }}
          Restart=always

          [Install]
          WantedBy=multi-user.target

    # -------------------------------------------------------------------------
    # Запуск
    # -------------------------------------------------------------------------
    - name: Start Vector
      ansible.builtin.systemd:
        name: vector
        state: started
        enabled: true
        daemon_reload: true

    # -------------------------------------------------------------------------
    # Открытие порта Vector (iptables)
    # -------------------------------------------------------------------------
    - name: Check Vector port 8686 rule
      ansible.builtin.shell: iptables -C INPUT -p tcp --dport 8686 -j ACCEPT
      register: vector_port
      failed_when: false
      changed_when: false

    - name: Open Vector port 8686
      ansible.builtin.shell: iptables -A INPUT -p tcp --dport 8686 -j ACCEPT
      when: vector_port.rc != 0

