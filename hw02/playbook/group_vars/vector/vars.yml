# =============================================================================
# group_vars/vector/vars.yml
#
# Назначение:
#   Переменные для установки и настройки Vector
#   (лог-агент / observability pipeline)
#
# Особенности:
#   ✔ фиксированная версия
#   ✔ предсказуемый URL сборки
#   ✔ разделение директорий (install/config/data)
#   ✔ готово для production deployment
# =============================================================================

---

# =============================================================================
# 📦 VERSION
# =============================================================================
# Фиксируем версию:
# - обеспечивает повторяемость деплоя
# - исключает "плавающие" изменения в upstream
# =============================================================================
vector_version: "0.31.0"


# =============================================================================
# 🖥 PLATFORM SETTINGS
# =============================================================================
# Эти параметры полезны для:
# - будущего расширения (multi-OS support)
# - генерации URL
# =============================================================================
vector_os: "unknown"      # оставлено для будущего расширения (linux/windows)
vector_arch: "amd64"      # архитектура сервера


# =============================================================================
# 🌍 DOWNLOAD SOURCE
# =============================================================================
# Почему GitHub release:
# - официальные релизы Vector
# - стабильные артефакты
# - reproducible builds
#
# ВАЖНО:
# URL зависит от версии → формируется динамически
# =============================================================================
vector_url: "https://github.com/vectordotdev/vector/releases/download/v{{ vector_version }}/vector-{{ vector_version }}-x86_64-unknown-linux-gnu.tar.gz"


# =============================================================================
# 📁 INSTALLATION DIRECTORIES
# =============================================================================
# Разделение директорий — стандарт production практики:
#
# /opt/vector     → бинарники (immutable install)
# /etc/vector     → конфиги (managed by Ansible)
# /var/lib/vector → runtime data (state, buffers)
# =============================================================================
vector_install_dir: "/opt/vector"
vector_config_dir: "/etc/vector"
vector_data_dir: "/var/lib/vector"


# =============================================================================
# ⚙ CONFIGURATION FILE
# =============================================================================
# Центральный конфиг Vector
# Обычно управляется через template (Jinja2)
# =============================================================================
vector_config_file: "{{ vector_config_dir }}/vector.toml"


# =============================================================================
# 🧠 OPTIONAL (RECOMMENDED FOR PRODUCTION)
# =============================================================================
# Можно добавить позже:
#
# vector_user: vector
# vector_group: vector
# vector_service_name: vector
# vector_log_level: info
# vector_api_port: 8686
#
# =============================================================================