# =============================================================================
# group_vars/clickhouse/vars.yml
#
# Назначение:
#   Общие переменные для установки ClickHouse
#
# Использование:
#   Подключается в site.yml через vars_files
#
# Особенности:
#   ✔ fallback mirrors (отказоустойчивость)
#   ✔ фиксированная версия пакетов
#   ✔ архитектурная совместимость
# =============================================================================

---

# =============================================================================
# 🔁 MIRRORS (fallback chain)
# =============================================================================
# Почему несколько зеркал:
# - если один источник недоступен → Ansible пробует следующий
# - повышает устойчивость установки в CI/CD и проде
# =============================================================================
clickhouse_mirrors:
  - "https://mirrors.aliyun.com/clickhouse/rpm/stable"
  - "https://repo.clickhouse.tech/rpm/stable"
  - "https://packages.clickhouse.com/rpm/stable"
  - "https://repo.yandex.ru/clickhouse/rpm/stable"


# =============================================================================
# 📦 VERSIONING
# =============================================================================
# Фиксируем версию:
# - предотвращает "плавающие" обновления
# - обеспечивает reproducible deployments
# =============================================================================
clickhouse_version: "22.3.3.44"


# =============================================================================
# 📁 TEMP DIRECTORY
# =============================================================================
# Где временно храним RPM пакеты перед установкой
# =============================================================================
clickhouse_rpm_dir: "/tmp/clickhouse"


# =============================================================================
# 📦 PACKAGES
# =============================================================================
# Список RPM пакетов ClickHouse
#
# Логика:
# - clickhouse-common-static → базовые библиотеки
# - clickhouse-client       → клиент CLI
# - clickhouse-server       → сервер
#
# arch_priority:
# - используется в playbook для выбора архитектуры
# =============================================================================
clickhouse_packages:

  - name: clickhouse-common-static
    arch_priority:
      - x86_64

  - name: clickhouse-client
    arch_priority:
      - noarch
      - x86_64

  - name: clickhouse-server
    arch_priority:
      - noarch
      - x86_64


# =============================================================================
# 🧠 OPTIONAL (рекомендуемое улучшение)
# =============================================================================
# Можно добавить в будущем:
#
# clickhouse_tcp_port: 9000
# clickhouse_http_port: 8123
# clickhouse_user: default
# clickhouse_db: logs
#
# =============================================================================