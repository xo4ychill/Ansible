# =============================================================================
# roles/lighthouse/tasks/main.yml – Установка Lighthouse UI + Nginx
# Назначение: развёртывание веб-интерфейса, настройка reverse-proxy, логи
# =============================================================================

- name: 📦 Install required packages
  ansible.builtin.package:
    name: "{{ lighthouse_packages }}"
    state: present
    update_cache: true
  register: _packages_installed

# -------------------------------------------------------------------------
# 🔄 Перезагрузка systemd после установки (критично для новых сервисов)
# -------------------------------------------------------------------------
- name: Reload systemd daemon after package installation
  ansible.builtin.systemd:
    daemon_reload: true
  when: _packages_installed is changed

# -------------------------------------------------------------------------
# 🗄️ Clone Lighthouse repository (или создать заглушку)
# -------------------------------------------------------------------------
- name: Check if lighthouse repo is accessible
  ansible.builtin.uri:
    url: "{{ lighthouse_repo | regex_replace('.git$', '') }}/archive/refs/heads/{{ lighthouse_version }}.tar.gz"
    method: HEAD
    timeout: 10
    status_code: [200, 301, 302]
  register: _repo_check
  failed_when: false
  changed_when: false
  ignore_errors: true

- name: Clone Lighthouse repository
  ansible.builtin.git:
    repo: "{{ lighthouse_repo }}"
    dest: "{{ lighthouse_dir }}"
    version: "{{ lighthouse_version }}"
    update: true
    depth: 1
    timeout: 60
  when: _repo_check.status | default(0) in [200, 301, 302]
  notify: reload nginx
  register: _lighthouse_clone
  retries: 2
  delay: 5
  until: _lighthouse_clone is success
  ignore_errors: true

# 🔄 Fallback: если репозиторий недоступен — создаём минимальную заглушку
- name: 📁 Ensure lighthouse directory exists (for fallback)
  ansible.builtin.file:
    path: "{{ lighthouse_dir }}"
    state: directory
    mode: "0755"
    owner: root
    group: root
  when: _lighthouse_clone is failed or _repo_check.status | default(0) not in [200, 301, 302]

- name: Create fallback index.html if repo clone failed
  ansible.builtin.copy:
    dest: "{{ lighthouse_dir }}/index.html"
    mode: "0644"
    owner: root
    group: root
    content: |
      <!DOCTYPE html>
      <html><head><title>Lighthouse</title></head>
      <body><h1>🚀 Lighthouse Dashboard</h1><p>Deployed via Ansible</p></body></html>
  when: _lighthouse_clone is failed or _repo_check.status | default(0) not in [200, 301, 302]
  notify: reload nginx

# -------------------------------------------------------------------------
# ⚙️ Nginx конфигурация
# -------------------------------------------------------------------------
- name: 📁 Create nginx log directory
  ansible.builtin.file:
    path: "{{ lighthouse_nginx_log_dir }}"
    state: directory
    owner: www-data
    group: adm
    mode: "0755"

- name: Deploy Nginx configuration
  ansible.builtin.template:
    src: "lighthouse.nginx.j2"
    dest: "{{ lighthouse_dir }}/lighthouse.conf"
    mode: "0644"
  notify: reload nginx

- name: 🔍 Validate full Nginx configuration
  ansible.builtin.command: nginx -t
  register: _nginx_config_test
  changed_when: false
  failed_when: _nginx_config_test.rc != 0

- name: 🚨 Debug Nginx config error
  ansible.builtin.debug:
    msg: "❌ Nginx config test failed: {{ _nginx_config_test.stderr }}"
  when: _nginx_config_test.rc != 0

# -------------------------------------------------------------------------
# ▶️ Запуск Nginx (с проверкой и отладкой)
# -------------------------------------------------------------------------
- name: Check if nginx service exists
  ansible.builtin.command: systemctl list-unit-files nginx.service
  register: _nginx_service_check
  changed_when: false
  failed_when: false

- name: Debug nginx service status
  ansible.builtin.debug:
    msg: "Nginx service check: rc={{ _nginx_service_check.rc }}, stdout={{ _nginx_service_check.stdout | default('') | trim }}"
  when: _nginx_service_check.rc != 0

- name: Enable and start Nginx
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
    daemon_reload: true
  register: _nginx_start
  retries: 3
  delay: 5
  until: _nginx_start is success
  ignore_errors: true

# 🚨 Если nginx не запустился — выводим диагностику
- name: Debug nginx startup failure
  ansible.builtin.debug:
    msg: |
      ❌ Failed to start nginx. Diagnostic info:
      - Service file exists: {{ _nginx_service_check.rc == 0 }}
      - Nginx binary: {{ lookup('pipe', 'which nginx', errors='ignore') | default('not found') }}
      - Config test: {{ lookup('pipe', 'nginx -t 2>&1', errors='ignore') | default('not run') }}
      - Journal logs: {{ lookup('pipe', 'journalctl -u nginx -n 10 --no-pager 2>&1', errors='ignore') | default('not available') }}
  when: _nginx_start is failed

- name: Start nginx via direct command (if systemd fails)
  ansible.builtin.command: nginx
  args:
    creates: /var/run/nginx.pid  # пропускаем, если nginx уже запущен
  when: _nginx_start is failed
  ignore_errors: true
