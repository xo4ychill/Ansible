# =============================================================================
# docker-compose.yml – тестовое окружение для выполнения заданий Ansible
# 
# Этот файл поднимает три контейнера на основе Linux-дистрибутивов:
#   - Ubuntu (группа deb в Ansible)
#   - CentOS 7 (группа el в Ansible)
#   - Fedora (группа fedora в Ansible)
# 
# Контейнеры остаются запущенными на 24 часа (sleep 86400), что даёт достаточно
# времени для многократного запуска playbook. После завершения работы
# контейнеры можно остановить командой: docker-compose down
# =============================================================================

services:
  fedora:
    image: pycontribs/fedora:latest
    container_name: fedora
    entrypoint: ["/bin/bash"]
    command: ["-c", "sleep 86400 && exit"]
    tty: true
    stdin_open: true

  centos:
    image: pycontribs/centos:7
    container_name: centos7
    entrypoint: ["/bin/bash"]
    command: ["-c", "sleep 86400 && exit"]
    tty: true
    stdin_open: true

  ubuntu:
    image: pycontribs/ubuntu:latest
    container_name: ubuntu
    entrypoint: ["/bin/bash"]
    command: ["-c", "sleep 86400 && exit"]
    tty: true
    stdin_open: true
